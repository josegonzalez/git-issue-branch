---
name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
          fi

          case "${{ github.event.inputs.release_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: make release
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/git-issue-branch-darwin-amd64
            dist/git-issue-branch-darwin-arm64
            dist/git-issue-branch-linux-amd64
            dist/git-issue-branch-linux-arm64

  homebrew:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Download darwin binaries
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          BASE_URL="https://github.com/josegonzalez"
          BASE="${BASE_URL}/git-issue-branch/releases/download/v${VERSION}"
          curl -fsSL -o git-issue-branch-darwin-amd64 \
            "${BASE}/git-issue-branch-darwin-amd64"
          curl -fsSL -o git-issue-branch-darwin-arm64 \
            "${BASE}/git-issue-branch-darwin-arm64"

      - name: Compute checksums
        id: checksums
        run: |
          AMD64=$(shasum -a 256 git-issue-branch-darwin-amd64 | awk '{print $1}')
          ARM64=$(shasum -a 256 git-issue-branch-darwin-arm64 | awk '{print $1}')
          echo "sha256_amd64=${AMD64}" >> "$GITHUB_OUTPUT"
          echo "sha256_arm64=${ARM64}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-repo
        uses: actions/checkout@v4
        with:
          repository: josegonzalez/homebrew-repo
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-repo

      - name: Update formula
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          SHA_AMD64="${{ steps.checksums.outputs.sha256_amd64 }}"
          SHA_ARM64="${{ steps.checksums.outputs.sha256_arm64 }}"
          REPO="josegonzalez/git-issue-branch"
          BASE="https://github.com/${REPO}/releases/download"

          cat > homebrew-repo/Formula/git-issue-branch.rb <<FORMULA
          class GitIssueBranch < Formula
            desc "Create git branches from GitHub issue numbers"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_arm do
              url "${BASE}/v${VERSION}/git-issue-branch-darwin-arm64"
              sha256 "${SHA_ARM64}"
            end

            on_intel do
              url "${BASE}/v${VERSION}/git-issue-branch-darwin-amd64"
              sha256 "${SHA_AMD64}"
            end

            def install
              bin.install Dir["git-issue-branch*"].first => "git-issue-branch"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/git-issue-branch --version")
            end
          end
          FORMULA

      - name: Create pull request
        run: |
          cd homebrew-repo
          VERSION="${{ needs.release.outputs.version }}"
          BRANCH="git-issue-branch-${VERSION}"
          git checkout -b "${BRANCH}"
          git add Formula/git-issue-branch.rb
          git commit -m "git-issue-branch ${VERSION}"
          git push origin "${BRANCH}"
          gh pr create \
            --title "git-issue-branch ${VERSION}" \
            --body "Update git-issue-branch to ${VERSION}" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
